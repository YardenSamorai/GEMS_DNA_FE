<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Per-scheme theme colours so the iOS PWA status-bar tint matches
         the current page background. Without these the bar always
         renders as the dark canvas colour, which looks broken when the
         user is in the light theme. -->
    <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF9" />
    <meta
      name="description"
      content="Gems DNA — CRM, inventory & business-card scanner"
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- iOS "Add to Home Screen" support — turns the site into a full-screen
         standalone app, with a proper app title and status-bar styling.
         "default" makes iOS reserve a strip at the top for the system
         status bar (clock + battery) and adapt its background to the
         current OS appearance, so our page content starts cleanly
         below — no notch overlap, no glass-blur weirdness. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GEMS DNA" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@400;500;600;700&family=Cormorant:wght@300;400;500;600;700&family=Inter:wght@100;200;300;400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Preload the brand 3D loader GLB so it's already in the HTTP
         cache by the time React mounts SpinningGem. Fetched as a
         no-credentials request because Vercel serves /public assets
         from the same origin and the model-viewer fetch() call uses
         the default fetch mode. -->
    <link rel="preload" href="%PUBLIC_URL%/loader/gem.glb" as="fetch" type="model/gltf-binary" crossorigin="anonymous" />

    <title>Gems DNA</title>
  </head>
  <body>
    <noscript>Gems DNA</noscript>

    <div id="root"></div>
  </body>
</html>
